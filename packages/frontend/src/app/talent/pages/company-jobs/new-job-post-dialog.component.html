<h2 mat-dialog-title>New Job Post</h2>

<mat-dialog-content class="dialog-content">
  <form class="form" [formGroup]="form" autocomplete="off">
    <mat-form-field appearance="outline">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" placeholder="e.g. Junior Frontend Intern (Angular)" />
    </mat-form-field>

    <div class="two">
      <mat-form-field appearance="outline">
        <mat-label>Location</mat-label>
        <input matInput formControlName="location" placeholder="e.g. Skopje, MK or Remote" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Work Mode</mat-label>
        <mat-select formControlName="workMode">
          <mat-option *ngFor="let m of workModes" [value]="m">{{ m }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="type-box">
      <div class="type-hd">Listing Type</div>
      <div class="type-grid">
        <mat-checkbox formControlName="isJob">Work</mat-checkbox>
        <mat-checkbox formControlName="isInternship">Internship</mat-checkbox>
      </div>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea
        matInput
        formControlName="description"
        rows="5"
        placeholder="What will the student work on? What does success look like?"
      ></textarea>
    </mat-form-field>

    <div class="reqs" formArrayName="requirements">
      <div class="reqs-hd">
        <div class="reqs-title">Required Skills</div>
        <button mat-stroked-button type="button" (click)="addRequirement()">
          <mat-icon aria-hidden="true">add</mat-icon>
          Add Skill
        </button>
      </div>

      <div class="reqs-list">
        <div class="req-row" *ngFor="let g of requirements.controls; let i = index" [formGroupName]="i">
          <mat-form-field appearance="outline">
            <mat-label>Skill</mat-label>
            <mat-select formControlName="skillName">
              <mat-option *ngFor="let s of (skills$ | async) ?? []" [value]="s">{{ s }}</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Min Years</mat-label>
            <input matInput type="number" min="0" max="50" formControlName="minYears" />
          </mat-form-field>

          <button
            mat-icon-button
            type="button"
            class="rm"
            (click)="removeRequirement(i)"
            [disabled]="requirements.length <= 1"
            aria-label="Remove requirement"
          >
            <mat-icon aria-hidden="true">close</mat-icon>
          </button>
        </div>
      </div>
    </div>
  </form>

  <section class="preview" *ngIf="potentialPreview$ | async as preview">
    <div class="preview-title">Potential matches</div>

    <div class="preview-line" *ngIf="preview.loading">
      <mat-progress-spinner mode="indeterminate" diameter="18"></mat-progress-spinner>
      <span>Calculating...</span>
    </div>

    <div class="preview-line ok" *ngIf="!preview.loading && preview.count !== null">
      <mat-icon aria-hidden="true">groups</mat-icon>
      <span>{{ preview.count }} students currently match this draft.</span>
    </div>

    <div class="preview-line err" *ngIf="!preview.loading && preview.errorMessage">
      <mat-icon aria-hidden="true">warning</mat-icon>
      <span>{{ preview.errorMessage }}</span>
    </div>
  </section>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()" [disabled]="isSubmitting">Cancel</button>
  <button mat-flat-button color="primary" type="button" (click)="submit()" [disabled]="form.invalid || isSubmitting">
    <mat-icon aria-hidden="true">publish</mat-icon>
    <span>{{ isSubmitting ? 'Posting...' : 'Post Job' }}</span>
  </button>
</mat-dialog-actions>
