<h2 mat-dialog-title>Reject Application</h2>

<mat-dialog-content>
  <p>
    Reject <strong>{{ data.applicantName }}</strong> for <strong>{{ data.jobTitle }}</strong>.
  </p>

  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="reason-field">
      <mat-label>Reason (optional)</mat-label>
      <textarea matInput rows="4" formControlName="reason"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" mat-dialog-close>Cancel</button>
  <button mat-flat-button color="warn" type="button" (click)="confirmReject()">Reject</button>
</mat-dialog-actions>
