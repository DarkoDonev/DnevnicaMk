<h2 mat-dialog-title>{{ 'Reject Application' | t }}</h2>

<mat-dialog-content>
  <p>
    {{ 'Reject {applicantName} for {jobTitle}.' | t: {applicantName: data.applicantName, jobTitle: data.jobTitle} }}
  </p>

  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="reason-field">
      <mat-label>{{ 'Reason (optional)' | t }}</mat-label>
      <textarea matInput rows="4" formControlName="reason"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" mat-dialog-close>{{ 'Cancel' | t }}</button>
  <button mat-flat-button color="warn" type="button" (click)="confirmReject()">{{ 'Reject' | t }}</button>
</mat-dialog-actions>
