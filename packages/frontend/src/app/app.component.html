<div class="app-shell">
  <mat-toolbar class="app-toolbar" color="primary">
    <ng-container *ngIf="authState$ | async as auth">
      <div
        class="brand"
        [routerLink]="auth.role === 'company' ? '/company/students' : auth.role === 'student' ? '/student/profile' : '/login'"
        tabindex="0"
        role="link"
        aria-label="TalentBridge home"
      >
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">TalentBridge</span>
      </div>

      <nav class="nav" *ngIf="auth.role" aria-label="Primary navigation">
        <ng-container *ngIf="auth.role === 'company'; else studentNav">
          <a mat-button routerLink="/company/students" routerLinkActive="active">Students</a>
          <a mat-button routerLink="/company/jobs" routerLinkActive="active">Post Jobs</a>
        </ng-container>
        <ng-template #studentNav>
          <a mat-button routerLink="/student/profile" routerLinkActive="active">Profile</a>
          <a mat-button routerLink="/student/jobs" routerLinkActive="active">Jobs</a>
        </ng-template>
      </nav>

      <span class="spacer"></span>

      <span class="who" *ngIf="auth.email">
        {{ auth.companyName ?? auth.email }}
      </span>

      <span class="role-pill" *ngIf="auth.role">
        <mat-icon aria-hidden="true">{{ auth.role === 'company' ? 'apartment' : 'school' }}</mat-icon>
        <span>{{ auth.role === 'company' ? 'Company' : 'Student' }}</span>
      </span>
      <button mat-button type="button" *ngIf="auth.role" (click)="logout()">Logout</button>
    </ng-container>
  </mat-toolbar>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>
